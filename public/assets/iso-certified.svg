<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 70" fill="none">
  <defs>
    <!-- Cyan to Blue Gradient -->
    <linearGradient id="iso-grad" x1="10" y1="10" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00DFD8" />
      <stop offset="100%" stop-color="#0070F3" />
    </linearGradient>
    <!-- Soft glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Circular Badge -->
  <g filter="url(#glow)">
    <circle cx="35" cy="35" r="28" stroke="url(#iso-grad)" stroke-width="2" fill="none" />
    <circle cx="35" cy="35" r="23" stroke="url(#iso-grad)" stroke-width="1" stroke-dasharray="3 2" fill="none" />
    <!-- Medical Cross with Checkmark -->
    <path d="M30 35 H40 M35 30 V40" stroke="url(#iso-grad)" stroke-width="2.5" stroke-linecap="round" />
    <path d="M31 35 L34 38 L41 30" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Typography beside Badge -->
  <!-- Main Heading -->
  <text x="75" y="30" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" letter-spacing="1">ISO 13485</text>
  <!-- Sub-headings -->
  <text x="75" y="45" fill="#a3a3a3" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500" letter-spacing="0.5">MEDICAL DEVICES QMS</text>
  <text x="75" y="56" fill="#00DFD8" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" font-weight="700" letter-spacing="1">CERTIFIED</text>
</svg>
