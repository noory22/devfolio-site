<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 70" fill="none">
  <defs>
    <!-- Green/Emerald Gradient -->
    <linearGradient id="drap-grad" x1="10" y1="10" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="glow-drap" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Shield/Crescent Badge -->
  <g filter="url(#glow-drap)">
    <circle cx="35" cy="35" r="28" stroke="url(#drap-grad)" stroke-width="2" fill="none" />
    <circle cx="35" cy="35" r="23" stroke="url(#drap-grad)" stroke-width="1" stroke-dasharray="3 2" fill="none" />
    <!-- Crescent & Star -->
    <path d="M29 34.5 A4.5 4.5 0 1 0 37.5 42.5 A5 5 0 1 1 29 34.5 Z" fill="#ffffff" />
    <polygon points="35,32 36,33.5 37.8,33.5 36.3,34.7 36.9,36.5 35.3,35.5 33.7,36.5 34.3,34.7 32.8,33.5 34.6,33.5" fill="#ffffff" />
  </g>

  <!-- Typography beside Badge -->
  <!-- Main Heading -->
  <text x="75" y="30" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" letter-spacing="1">DRAP APPROVED</text>
  <!-- Sub-headings -->
  <text x="75" y="45" fill="#a3a3a3" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500" letter-spacing="0.5">DRUG REGULATORY AUTHORITY</text>
  <text x="75" y="56" fill="#10B981" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" font-weight="700" letter-spacing="1">REGISTERED FACILITY</text>
</svg>
